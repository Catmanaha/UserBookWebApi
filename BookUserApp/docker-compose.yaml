services:
    userswebapi:
        image: userswebapi
        container_name: userswebapi
        ports:
            - 5246:8080
        build:
            context: .
            dockerfile: UsersWebApi.dockerfile
        depends_on:
            - mssql
            - bookswebapi
        environment:
            ConnectionStrings__DefaultConnectionString: "Server=mssql;Database=UserBookDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:?MSSQL_SA_PASSWORD is required};TrustServerCertificate=True;"
            BooksApiBaseAddress: "http://bookswebapi:8080/"
        networks:
            - defaultnetwork

    bookswebapi:
        image: bookswebapi
        ports:
            - 5283:8080
        container_name: bookswebapi
        build:
            context: .
            dockerfile: BooksWebApi.dockerfile
        depends_on:
            - mongo
        environment:
            MongoDbOption__MongoDbConnectionString: "mongodb://mongo:27017"
            MongoDbOption__DatabaseName: "UserBookDb"
            MongoDbOption__CollectionName: "Books"
        networks:
            - defaultnetwork

    mongo:
        image: mongo:7
        container_name: mongoDb
        ports:
            - 27017:27017
        networks:
            - defaultnetwork
        volumes:
            - mongovolume:/data/db

    mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        container_name: mssqlDb
        environment:
            ACCEPT_EULA: "Y"
            MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?MSSQL_SA_PASSWORD is required}"
        volumes:
            - mssqlvolume:/var/opt/mssql
        ports:
            - 15241:1433
        networks:
            - defaultnetwork

networks:
    defaultnetwork:
        driver: bridge

volumes:
    mongovolume:
    mssqlvolume:
